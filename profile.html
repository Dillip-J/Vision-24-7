<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision - My Profile</title>
    <link rel="stylesheet" href="css/home.css"> 
    <link rel="stylesheet" href="css/payment.css">
    <link rel="stylesheet" href="css/profile.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-main">

    <header class="profile-top-header">
        <div class="content-wrapper header-content">
            <div class="header-left">
                <a href="home.html" class="back-arrow text-white"><i class="fa-solid fa-arrow-left"></i></a>
                <h1 class="header-title">My Profile</h1>
            </div>
            <button id="theme-toggle" class="icon-button text-white" aria-label="Toggle Dark Mode">
                <i class="fa-regular fa-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>

    <main class="content-wrapper profile-layout">
        
        <section class="profile-card hero-card">
            <div class="avatar-wrapper" id="avatar-clickable" title="Tap to change picture">
                <div class="profile-avatar" id="avatar-initials">--</div>
                <div class="status-dot"></div>
            </div>
            <div class="profile-header-info">
                <h2 id="display-name">Loading...</h2>
                <p id="display-email">Loading...</p>
                <div class="profile-header-actions">
                    <button type="button" class="btn-outline-small" id="btn-change-pic">Change Profile Picture</button>
                    <input type="file" id="mobile-image-upload" accept="image/*" style="display: none;">
                </div>
            </div>
        </section>

        <section class="profile-card">
            <div class="card-header">
                <h3>Personal Information</h3>
                <p>Update your personal details</p>
            </div>
            
            <form class="profile-form" id="personal-info-form">
                <div class="form-grid-2">
                    <div class="input-group">
                        <label><i class="fa-regular fa-user"></i> Full Name</label>
                        <input type="text" id="input-name" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fa-regular fa-envelope"></i> Email</label>
                        <input type="email" id="input-email" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fa-solid fa-phone"></i> Phone Number</label>
                        <input type="tel" id="input-phone">
                    </div>
                    <div class="input-group">
                        <label><i class="fa-regular fa-calendar"></i> Date of Birth</label>
                        <input type="date" id="input-dob">
                    </div>
                </div>
            </form>
        </section>


        <div class="profile-action-footer">
            <button class="btn-save" id="btn-save-profile">
                <i class="fa-regular fa-floppy-disk"></i> Save Changes
            </button>
            <button class="btn-cancel" id="btn-cancel-profile">Cancel</button>
        </div>

    </main>

    <script src="js/config.js"></script>
    <script src="js/script.js"></script>
    <script src="js/auth_guard.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
